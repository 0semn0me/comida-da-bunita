<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O que vamos comer hoje?</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-100 font-sans pb-10">

    <header class="bg-red-500 text-white p-5 text-center shadow-md sticky top-0 z-10">
        <h1 class="text-xl font-bold">Rastreador de Fome 🔎</h1>
        <p class="text-sm opacity-90">Varredura de até 3km (Fora do Óbvio)</p>
    </header>

    <div class="p-4 bg-white shadow-sm sticky top-[68px] z-10 overflow-x-auto whitespace-nowrap flex gap-2 scrollbar-none">
        <button onclick="filtrar('todos')" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-full font-medium text-sm active:scale-95 transition">Tudo</button>
        <button onclick="filtrar('ogro')" class="bg-red-100 text-red-700 px-4 py-2 rounded-full font-medium text-sm active:scale-95 transition">🍔 Algo Gordo / Ogro</button>
        <button onclick="filtrar('comida')" class="bg-orange-100 text-orange-700 px-4 py-2 rounded-full font-medium text-sm active:scale-95 transition">🍛 Comida de Verdade</button>
        <button onclick="filtrar('doce')" class="bg-pink-100 text-pink-700 px-4 py-2 rounded-full font-medium text-sm active:scale-95 transition">🍰 Beliscar / Doce</button>
        <button onclick="filtrar('leve')" class="bg-green-100 text-green-700 px-4 py-2 rounded-full font-medium text-sm active:scale-95 transition">🥗 Algo Leve</button>
    </div>

    <main class="p-4 max-w-md mx-auto space-y-4" id="lista-restaurantes">
        
        <div class="bg-white rounded-xl shadow-sm overflow-hidden card-restaurante" data-desejo="ogro" onclick="abrirModal('Burger do Bairro', 'R$ 25 - R$ 45', ['https://picsum.photos/id/102/600/400', 'https://picsum.photos/id/1060/600/400'])">
            <div class="flex h-24">
                <img src="https://picsum.photos/id/102/150/150" class="w-24 h-full object-cover" alt="Hambúrguer">
                <div class="p-3 flex flex-col justify-between flex-1">
                    <div>
                        <h3 class="font-bold text-gray-800 text-base">Podrão do Ivan (Não tá no iFood)</h3>
                        <p class="text-xs text-gray-500">⭐ 4.8 • 1.2 km de distância</p>
                    </div>
                    <span class="text-xs text-green-600 font-semibold bg-green-50 self-start px-2 py-0.5 rounded">Aberto agora</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden card-restaurante" data-desejo="comida" onclick="abrirModal('Restaurante da Dona Maria', 'PF Comercial: R$ 22,00', ['https://picsum.photos/id/429/600/400', 'https://picsum.photos/id/493/600/400'])">
            <div class="flex h-24">
                <img src="https://picsum.photos/id/429/150/150" class="w-24 h-full object-cover" alt="Comida">
                <div class="p-3 flex flex-col justify-between flex-1">
                    <div>
                        <h3 class="font-bold text-gray-800 text-base">Pensando Caseiro (Marmitaria)</h3>
                        <p class="text-xs text-gray-500">⭐ 4.9 • 2.1 km de distância</p>
                    </div>
                    <span class="text-xs text-green-600 font-semibold bg-green-50 self-start px-2 py-0.5 rounded">Aberto agora</span>
                </div>
            </div>
        </div>

    </main>

    <div id="modal-cardapio" class="modal fixed inset-0 bg-black/60 z-50 items-end justify-center p-4" onclick="fecharModal(event)">
        <div class="bg-white w-full max-w-md rounded-t-2xl p-5 space-y-4 animate-slide-up" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center border-b pb-2">
                <h2 id="modal-titulo" class="text-lg font-bold text-gray-900">Nome do Lugar</h2>
                <button onclick="document.getElementById('modal-cardapio').classList.remove('active')" class="text-gray-400 text-2xl">&times;</button>
            </div>
            
            <div class="w-full h-48 bg-gray-200 rounded-lg overflow-hidden">
                <img id="modal-foto" src="" class="w-full h-full object-cover" alt="Foto do Prato">
            </div>

            <div>
                <h4 class="text-sm font-semibold text-gray-700">Valores Médios / Destaque:</h4>
                <p id="modal-precos" class="text-sm text-gray-600 font-mono mt-1">Preços aqui...</p>
            </div>

            <a href="https://wa.me/5511999999999?text=Olá!%20Gostaria%20de%20ver%20o%20cardápio." target="_blank" class="block w-full bg-green-500 text-white text-center py-3 rounded-xl font-bold shadow-md hover:bg-green-600 transition">
                💬 Chamar no WhatsApp do Lugar
            </a>
        </div>
    </div>

    <script>
        // Função para filtrar a lista na hora que clicar nos desejos
        function filtrar(desejo) {
            const cards = document.querySelectorAll('.card-restaurante');
            cards.forEach(card => {
                if (desejo === 'todos' || card.getAttribute('data-desejo') === desejo) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // Função para abrir o álbum de fotos e detalhes do restaurante
        function abrirModal(nome, precos, fotos) {
            document.getElementById('modal-titulo').innerText = nome;
            document.getElementById('modal-precos').innerText = precos;
            document.getElementById('modal-foto').src = fotos[0]; // Pega a primeira foto do álbum
            document.getElementById('modal-cardapio').classList.add('active');
        }

        function fecharModal(e) {
            document.getElementById('modal-cardapio').classList.remove('active');
        }
    </script>
</body>
</html>
