<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comida da Bunita</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  :root {
    --red:    #e8272a;
    --bg:     #f2f2f7;
    --white:  #ffffff;
    --card:   #ffffff;
    --text:   #1c1c1e;
    --sub:    #8e8e93;
    --border: #e5e5ea;

    /* faixas de preço */
    --barato:   #34c759;
    --medio:    #ff9f0a;
    --pesado:   #ff3b30;
  }

  body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* ──────── HEADER ──────── */
  header {
    background: linear-gradient(135deg, #c0181b 0%, #e8272a 60%, #ff4e4e 100%);
    color:#fff;
    padding: 18px 16px 14px;
    text-align:center;
    position:sticky; top:0; z-index:20;
    box-shadow: 0 2px 20px rgba(232,39,42,.35);
  }
  header h1 { font-size:1.3rem; font-weight:900; letter-spacing:-.3px; }
  #status-gps { font-size:.72rem; opacity:.85; margin-top:3px; font-weight:600; }

  /* ──────── FILTROS ──────── */
  #filtros {
    background:var(--white);
    border-bottom:1px solid var(--border);
    padding:10px 12px;
    display:flex; gap:8px;
    overflow-x:auto; -webkit-overflow-scrolling:touch;
    position:sticky; top:65px; z-index:19;
    scrollbar-width:none;
  }
  #filtros::-webkit-scrollbar { display:none; }

  .filtro-btn {
    flex-shrink:0;
    padding:7px 14px;
    border-radius:20px;
    border:none;
    font-family:'Nunito',sans-serif;
    font-size:.78rem; font-weight:700;
    cursor:pointer; transition:all .18s;
    background:#f2f2f7; color:#555;
  }
  .filtro-btn.active, .filtro-btn:active {
    background:var(--red); color:#fff;
    box-shadow:0 2px 10px rgba(232,39,42,.3);
  }

  /* ──────── LISTA ──────── */
  #lista { padding:12px; max-width:500px; margin:0 auto; display:flex; flex-direction:column; gap:10px; }

  .card {
    background:var(--card);
    border-radius:16px;
    overflow:hidden;
    display:flex;
    box-shadow:0 1px 6px rgba(0,0,0,.07);
    cursor:pointer;
    transition:transform .15s, box-shadow .15s;
    border:1px solid var(--border);
    position:relative;
  }
  .card:active { transform:scale(.98); box-shadow:0 1px 3px rgba(0,0,0,.06); }

  /* faixa de preço colorida na borda esquerda */
  .card::before {
    content:'';
    position:absolute; left:0; top:0; bottom:0; width:4px;
    border-radius:4px 0 0 4px;
  }
  .card.preco-barato::before  { background:var(--barato); }
  .card.preco-medio::before   { background:var(--medio); }
  .card.preco-pesado::before  { background:var(--pesado); }

  .card-img {
    width:76px; height:76px;
    object-fit:cover; flex-shrink:0;
    background:#eee;
    margin:auto 0 auto 4px;
    border-radius:12px;
  }

  .card-body {
    flex:1; padding:10px 10px 10px 12px;
    display:flex; flex-direction:column; justify-content:space-between;
    min-width:0;
  }

  .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:6px; }
  .card-nome { font-weight:800; font-size:.92rem; line-height:1.2; color:var(--text); }
  .card-tipo { font-size:.7rem; color:var(--sub); font-weight:600; margin-top:2px; }

  /* bolinha indicadora de preço */
  .preco-dot {
    width:11px; height:11px;
    border-radius:50%;
    flex-shrink:0; margin-top:3px;
  }
  .dot-barato { background:var(--barato); box-shadow:0 0 6px rgba(52,199,89,.5); }
  .dot-medio  { background:var(--medio);  box-shadow:0 0 6px rgba(255,159,10,.5); }
  .dot-pesado { background:var(--pesado); box-shadow:0 0 6px rgba(255,59,48,.5); }

  .card-bottom { display:flex; justify-content:space-between; align-items:center; font-size:.72rem; color:var(--sub); font-weight:700; margin-top:4px; }

  /* ──────── MODAL ──────── */
  .modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.55); z-index:50;
    align-items:flex-end; justify-content:center;
    backdrop-filter:blur(3px);
  }
  .modal-overlay.active { display:flex; }

  .modal-box {
    background:var(--white);
    border-radius:24px 24px 0 0;
    padding:0 0 32px;
    width:100%; max-width:500px;
    animation:slide-up .28s cubic-bezier(.34,1.4,.64,1);
    max-height:90vh; overflow-y:auto;
  }
  @keyframes slide-up { from { transform:translateY(100%); } to { transform:translateY(0); } }

  .modal-handle {
    width:40px; height:4px; border-radius:2px;
    background:#ddd; margin:12px auto 0;
  }

  .modal-header {
    padding:16px 20px 14px;
    border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:flex-start;
  }
  .modal-titulo { font-weight:900; font-size:1.2rem; line-height:1.2; }
  .modal-sub { font-size:.75rem; color:var(--sub); margin-top:3px; font-weight:600; }

  .modal-close {
    background:var(--bg); border:none; border-radius:50%;
    width:30px; height:30px; font-size:1.1rem;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    color:var(--sub); flex-shrink:0; margin-top:2px;
  }

  /* faixa de preço no modal */
  .modal-preco-bar {
    margin:14px 20px 0;
    border-radius:12px;
    padding:10px 14px;
    font-size:.8rem; font-weight:800;
    display:flex; align-items:center; gap:8px;
  }
  .bar-barato { background:#e8faf0; color:#1a8a3c; }
  .bar-medio  { background:#fff5e0; color:#b36b00; }
  .bar-pesado { background:#fff0ef; color:#c0241b; }

  /* botões dos apps */
  .modal-apps {
    padding:16px 20px 0;
    display:flex; gap:12px;
  }

  .app-btn {
    flex:1;
    height:54px;
    border-radius:14px;
    border:none;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:transform .15s, box-shadow .15s;
    text-decoration:none;
    overflow:hidden;
  }
  .app-btn:active { transform:scale(.94); }

  /* iFood: fundo BRANCO com borda vermelha sutil */
  .btn-ifood { background:#ffffff; box-shadow:0 3px 12px rgba(0,0,0,.12); border:1.5px solid #e8e8e8; }
  /* Keeta: fundo AMARELO marca */
  .btn-keeta { background:#ffe600; box-shadow:0 3px 12px rgba(255,230,0,.4); }
  /* 99Food: fundo AMARELO-LARANJA marca */
  .btn-99    { background:#ffcc00; box-shadow:0 3px 12px rgba(255,204,0,.4); }

  .app-logo { width:40px; height:40px; object-fit:contain; border-radius:8px; }
  .logo-svg { width:32px; height:32px; }

  .modal-distancia {
    margin:14px 20px 0;
    background:var(--bg);
    border-radius:12px;
    padding:10px 14px;
    font-size:.78rem; color:#555; font-weight:700;
    display:flex; align-items:center; gap:6px;
  }

  /* ──────── LOADING ──────── */
  #msg-carregando { text-align:center; color:var(--sub); padding:40px 0; font-weight:700; font-size:.9rem; }

  /* ──────── LEGENDA ──────── */
  .legenda {
    display:flex; gap:14px; padding:10px 16px 2px;
    justify-content:center; max-width:500px; margin:0 auto;
  }
  .legenda-item { display:flex; align-items:center; gap:5px; font-size:.68rem; font-weight:700; color:var(--sub); }
  .legenda-dot { width:9px; height:9px; border-radius:50%; }
</style>
</head>
<body>

<header>
  <h1>🍕 Comida da Bunita</h1>
  <p id="status-gps">Carregando radar gastronômico...</p>
</header>

<div id="filtros">
  <button class="filtro-btn active" onclick="filtrar('todos',this)">Tudo</button>
  <button class="filtro-btn" onclick="filtrar('fast_food|pizza|burger|lanche',this)">🍔 Algo Gordo</button>
  <button class="filtro-btn" onclick="filtrar('restaurant|churrascaria',this)">🍛 Comida de Verdade</button>
  <button class="filtro-btn" onclick="filtrar('bakery|cafe',this)">☕ Café & Doce</button>
  <button class="filtro-btn" onclick="filtrar('pastel',this)">🥟 Pastelaria</button>
</div>

<div class="legenda">
  <div class="legenda-item"><div class="legenda-dot" style="background:#34c759"></div>Tranquilo ta Barato</div>

  <div class="legenda-item"><div class="legenda-dot" style="background:#ff3b30"></div>Pesadinho</div>
</div>

<main id="lista">
  <p id="msg-carregando">🔍 Sintonizando com o bairro...</p>
</main>

<!-- MODAL -->
<div id="modal" class="modal-overlay" onclick="fecharModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div class="modal-titulo" id="m-titulo">—</div>
        <div class="modal-sub" id="m-subtipo">—</div>
      </div>
      <button class="modal-close" onclick="fecharModal()">✕</button>
    </div>

    <div id="m-preco-bar" class="modal-preco-bar bar-medio">💰 Médio / Mei Caro — até R$60</div>

    <!-- Linha 1: iFood + Keeta + 99Food -->

          <text x="4" y="50" font-family="Arial Black,Impact,sans-serif" font-size="52" font-weight="900" fill="#ea1d2c" letter-spacing="-2">ifood</text>
          <!-- sorriso/seta curva embaixo -->
          <path d="M22 58 Q68 76 108 56" stroke="#ea1d2c" stroke-width="4.5" fill="none" stroke-linecap="round"/>

      <!-- Keeta: fundo AMARELO, logo preto -->
      <a id="btn-keeta" href="#" target="_blank" class="app-btn btn-keeta" title="Keeta">
        <svg viewBox="0 0 130 68" width="84" height="34">
          <!-- "keeta" bold arredondado -->
          <text x="4" y="46" font-family="Arial Rounded MT Bold,Arial Black,Verdana,sans-serif" font-size="44" font-weight="900" fill="#111" letter-spacing="-1">keeta</text>
          <!-- sorriso pontilhado / garfo -->
          <path d="M12 54 Q55 72 108 52" stroke="#111" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-dasharray="5 4"/>
          <circle cx="112" cy="51" r="3.5" fill="#111"/>

      <!-- 99Food: fundo AMARELO-DOURADO, logo preto -->

          <!-- "99" grande -->

          <!-- "Food" centralizado embaixo -->

        </svg>

    </div>

    <!-- Linha 2: Google -->
    <div style="padding:10px 20px 0;">
      <a id="btn-google" href="#" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;height:48px;border-radius:14px;background:#fff;border:1.5px solid #e0e0e0;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:all .15s;" title="Ver no Google">
        <!-- Google G colorido -->
        <svg width="22" height="22" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>

    <div class="modal-distancia" id="m-distancia">📍 — · 🕒 —</div>
  </div>
</div>

<script>
const LOCAL_BASE = "Vila Augusta, Guarulhos";
let listaLocais = [], minhaLat = 0, minhaLng = 0;

// ── Fotos por tipo/nome ──────────────────────────────────────────────────────
const FOTOS = {
  pizza:       'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=300&q=80',
  burger:      'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300&q=80',
  hamburguer:  'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300&q=80',
  sushi:       'https://images.unsplash.com/photo-1553621042-f6e147245754?w=300&q=80',
  churrasco:   'https://images.unsplash.com/photo-1544025162-d76694265947?w=300&q=80',
  churrascaria:'https://images.unsplash.com/photo-1544025162-d76694265947?w=300&q=80',
  pastel:      'https://images.unsplash.com/photo-1601924582970-9238bcb495d9?w=300&q=80',
  tapioca:     'https://images.unsplash.com/photo-1601924582970-9238bcb495d9?w=300&q=80',
  bakery:      'https://images.unsplash.com/photo-1509440159596-0249088772ff?w=300&q=80',
  cafe:        'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=300&q=80',
  doceria:     'https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?w=300&q=80',
  japanese:    'https://images.unsplash.com/photo-1617196034183-421b4040ed20?w=300&q=80',
  frango:      'https://images.unsplash.com/photo-1598103442097-8b74394b95c1?w=300&q=80',
  steak:       'https://images.unsplash.com/photo-1546833999-b9f581a1996d?w=300&q=80',
  salada:      'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=300&q=80',
  default:     'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300&q=80',
  fast_food:   'https://images.unsplash.com/photo-1561758033-d89a9ad46330?w=300&q=80',
  restaurant:  'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=300&q=80',
};

function getFoto(nome, amenity) {
  const n = nome.toLowerCase();
  for (const [k, v] of Object.entries(FOTOS)) {
    if (n.includes(k)) return v;
  }
  return FOTOS[amenity] || FOTOS.default;
}

// ── Preço por tipo/nome ──────────────────────────────────────────────────────
function getPreco(nome, amenity) {
  const n = nome.toLowerCase();
  // Pesadinho (>R$60)
  if (/churrascaria|steak|assador|rodizio|rodízio|bistrô|bistro|japonês|japones|sushi|temakeria|seafood|frutos/.test(n))
    return { nivel:'pesado', txt:'🔴 Pesadinho — acima de R$60', barClass:'bar-pesado', label:'Pesadinho' };
  // Barato (<R$35)
  if (/pastel|pastelaria|doceria|doce|cafe|café|bakery|padaria|lanche rápido|cachorro|tapioca|coxinha|esfiha|habibs|habib|subway|bob|mcdonalds|mcdonald|burger king|kfc/.test(n) || amenity === 'bakery' || amenity === 'cafe')
    return { nivel:'barato', txt:'🟢 Tranquilo ta Barato — até R$35', barClass:'bar-barato', label:'Barato' };
  // Médio (R$35–60)
  return { nivel:'medio', txt:'🟡 Médio / Mei Caro — até R$60', barClass:'bar-medio', label:'Médio' };
}

// ── Haversine ────────────────────────────────────────────────────────────────
function dist(la1,lo1,la2,lo2) {
  const R=6371, dLa=(la2-la1)*Math.PI/180, dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── Boot ─────────────────────────────────────────────────────────────────────
window.onload = () => {
  document.getElementById('status-gps').innerText = `📍 Buscando ao redor de: ${LOCAL_BASE}`;
  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(LOCAL_BASE)}`)
    .then(r=>r.json()).then(d=>{
      if(d&&d.length>0){
        minhaLat=parseFloat(d[0].lat); minhaLng=parseFloat(d[0].lon);
        varrer(minhaLat,minhaLng);
      }
    });
};

function varrer(lat,lng) {
  // Overpass "around" = círculo real de 3000m centrado em você
  const query = `[out:json][timeout:25];
(
  node["amenity"~"restaurant|fast_food|cafe|bakery"](around:3000,${lat},${lng});
);
out body;`;
  const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

  fetch(url).then(r=>r.json()).then(d=>{
    if(d.elements&&d.elements.length){
      // Filtro extra: garantir que dist real ≤ 3.0 km (segurança dupla)
      listaLocais = d.elements.filter(l => {
        const d = dist(lat, lng, parseFloat(l.lat), parseFloat(l.lon));
        return d <= 3.0;
      });
      renderizar(listaLocais);
      document.getElementById('status-gps').innerText=`🍿 ${listaLocais.length} opções em até 3km de você!`;
    } else {
      document.getElementById('msg-carregando').innerText='Nenhum restaurante encontrado próximo.';
    }
  }).catch(()=>{ document.getElementById('msg-carregando').innerText='Instabilidade na rede. Recarregue.'; });
}

async function renderizar(locais) {
  const el = document.getElementById('lista');
  el.innerHTML='';

  // Cache de bairros já buscados por lat,lon arredondado
  const bairroCache = {};

  async function getBairro(lat, lon, tagsData) {
    // 1) Tenta tags OSM do próprio nó (quando cadastrado)
    const tagBairro = tagsData['addr:suburb'] || tagsData['addr:neighbourhood'] ||
                      tagsData['addr:quarter'] || tagsData['addr:city_district'] || '';
    if (tagBairro) return tagBairro;

    // 2) Cache para não repetir chamada para coords vizinhas
    const key = parseFloat(lat).toFixed(4) + ',' + parseFloat(lon).toFixed(4);
    if (bairroCache[key] !== undefined) return bairroCache[key];

    // 3) Geocodificação reversa Nominatim — zoom=17 = nível bairro/rua preciso
    //    featuretype=neighbourhood força retornar bairro, não cidade
    try {
      const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=17&addressdetails=1&accept-language=pt-BR`;
      const r = await fetch(url, { headers: { 'Accept-Language': 'pt-BR,pt;q=0.9' } });
      const d = await r.json();
      const a = d.address || {};
      // Prioridade: suburb (bairro) > neighbourhood > quarter > city_district > district > town > city
      const b = a.suburb || a.neighbourhood || a.quarter ||
                a.city_district || a.district || a.town || a.city || '';
      bairroCache[key] = b;
      return b;
    } catch(e) {
      bairroCache[key] = '';
      return '';
    }
  }

  const formatados = locais.map(l=>{
    const nome = l.tags.name||'Comércio de Comida';
    const amenity = l.tags.amenity||'restaurant';
    const d = dist(minhaLat,minhaLng,parseFloat(l.lat),parseFloat(l.lon));
    const t = Math.max(2,Math.round(d*3.5));
    return { nome, amenity, d, t, foto:getFoto(nome,amenity), preco:getPreco(nome,amenity), lat:l.lat, lon:l.lon, tags:l.tags, bairro:'' };
  }).sort((a,b)=>a.d-b.d);

  // Renderiza imediatamente (sem bairro) e vai preenchendo conforme as geocodificações chegam
  formatados.forEach(l => criarCard(el, l));

  // Busca bairros sequencial 1 por 1 respeitando rate limit Nominatim (max 1 req/s)
  for (const l of formatados) {
    l.bairro = await getBairro(l.lat, l.lon, l.tags);
    const cardEl = document.querySelector(`.card[data-id="${l.lat}_${l.lon}"]`);
    if (cardEl) {
      const tipoLabel = ({restaurant:'🍛 Restaurante',fast_food:'🍔 Lanche / Fast Food',cafe:'☕ Café / Sobremesa',bakery:'🥐 Padaria / Doceria'})[l.amenity]||'🍽 Alimentação';
      const subLabel = l.bairro ? '📌 ' + l.bairro : tipoLabel;
      const tipoEl = cardEl.querySelector('.card-tipo');
      if (tipoEl) tipoEl.textContent = subLabel;
    }
    await new Promise(r => setTimeout(r, 1100)); // 1.1s entre requests = respeita 1 req/s
  }
}

function criarCard(container, l) {
  const div=document.createElement('div');
  div.className=`card preco-${l.preco.nivel}`;
  div.setAttribute('data-tipo',l.amenity);
  div.setAttribute('data-nome',l.nome.toLowerCase());
  div.setAttribute('data-id', `${l.lat}_${l.lon}`);

  const tipoLabel = ({restaurant:'🍛 Restaurante',fast_food:'🍔 Lanche / Fast Food',cafe:'☕ Café / Sobremesa',bakery:'🥐 Padaria / Doceria'})[l.amenity]||'🍽 Alimentação';

  div.innerHTML=`
    <img class="card-img" src="${l.foto}" alt="${l.nome}" loading="lazy" onerror="this.src='${FOTOS.default}'">
    <div class="card-body">
      <div class="card-top">
        <div>
          <div class="card-nome">${l.nome}</div>
          <div class="card-tipo">${tipoLabel}</div>
        </div>
        <div class="preco-dot dot-${l.preco.nivel}"></div>
      </div>
      <div class="card-bottom">
        <span>📍 ${l.d.toFixed(1)} km</span>
        <span>🕒 ~${l.t} min</span>
      </div>
    </div>`;

  div.onclick=()=>abrirModal(l);
  container.appendChild(div);
}

// ── Filtro ───────────────────────────────────────────────────────────────────
function filtrar(cat, btn) {
  document.querySelectorAll('.filtro-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.querySelectorAll('.card').forEach(c=>{
    if(cat==='todos'){ c.style.display='flex'; return; }
    const regex=new RegExp(cat);
    c.style.display=(regex.test(c.dataset.tipo)||regex.test(c.dataset.nome))?'flex':'none';
  });
}

// ── Modal ────────────────────────────────────────────────────────────────────
function abrirModal(l) {
  const tipoLabel = ({restaurant:'🍛 Restaurante',fast_food:'🍔 Lanche / Fast Food',cafe:'☕ Café / Sobremesa',bakery:'🥐 Padaria / Doceria'})[l.amenity]||'🍽 Alimentação';

  document.getElementById('m-titulo').innerText = l.nome;
  document.getElementById('m-subtipo').innerText = tipoLabel;

  const bar = document.getElementById('m-preco-bar');
  bar.className = `modal-preco-bar ${l.preco.barClass}`;
  bar.innerText = l.preco.txt;

  document.getElementById('m-distancia').innerHTML = `📍 ${l.d.toFixed(1)} km de distância &nbsp;·&nbsp; 🕒 ~${l.t} min de carro`;

  const q = encodeURIComponent(l.nome);
  const qLocal = encodeURIComponent(l.nome + ' Guarulhos');
  document.getElementById('btn-ifood').href  = `https://www.ifood.com.br/busca?q=${q}`;
  document.getElementById('btn-keeta').href  = `https://keeta.com.br/busca?q=${q}`;
  document.getElementById('btn-99').href     = `https://www.99app.com/food?q=${q}`;
  document.getElementById('btn-google').href = `https://www.google.com/search?q=${qLocal}+cardapio+fotos`;

  document.getElementById('modal').classList.add('active');
  document.body.style.overflow='hidden';
}

function fecharModal() {
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow='';
}
</script>
</body>
</html>
