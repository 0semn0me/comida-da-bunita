<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comida da Bunita</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  :root {
    --red:    #e8272a;
    --bg:      #f2f2f7;
    --white:  #ffffff;
    --card:   #ffffff;
    --text:   #1c1c1e;
    --sub:    #8e8e93;
    --border: #e5e5ea;

    /* faixas de preço */
    --barato:   #34c759;
    --medio:    #ff9f0a;
    --pesado:   #ff3b30;
  }

  body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* ──────── HEADER ──────── */
  header {
    background: linear-gradient(135deg, #c0181b 0%, #e8272a 60%, #ff4e4e 100%);
    color:#fff;
    padding: 18px 16px 14px;
    text-align:center;
    position:sticky; top:0; z-index:20;
    box-shadow: 0 2px 20px rgba(232,39,42,.35);
  }
  header h1 { font-size:1.3rem; font-weight:900; letter-spacing:-.3px; }
  #status-gps { font-size:.72rem; opacity:.85; margin-top:3px; font-weight:600; }

  /* ──────── FILTROS ──────── */
  #filtros {
    background:var(--white);
    border-bottom:1px solid var(--border);
    padding:10px 12px;
    display:flex; gap:8px;
    overflow-x:auto; -webkit-overflow-scrolling:touch;
    position:sticky; top:65px; z-index:19;
    scrollbar-width:none;
  }
  #filtros::-webkit-scrollbar { display:none; }

  .filtro-btn {
    flex-shrink:0;
    padding:7px 14px;
    border-radius:20px;
    border:none;
    font-family:'Nunito',sans-serif;
    font-size:.78rem; font-weight:700;
    cursor:pointer; transition:all .18s;
    background:#f2f2f7; color:#555;
  }
  .filtro-btn.active, .filtro-btn:active {
    background:var(--red); color:#fff;
    box-shadow:0 2px 10px rgba(232,39,42,.3);
  }

  /* ──────── LISTA ──────── */
  #lista { padding:12px; max-width:500px; margin:0 auto; display:flex; flex-direction:column; gap:10px; }

  .card {
    background:var(--card);
    border-radius:16px;
    overflow:hidden;
    display:flex;
    box-shadow:0 1px 6px rgba(0,0,0,.07);
    cursor:pointer;
    transition:transform .15s, box-shadow .15s;
    border:1px solid var(--border);
    position:relative;
  }
  .card:active { transform:scale(.98); box-shadow:0 1px 3px rgba(0,0,0,.06); }

  /* faixa de preço colorida na borda esquerda */
  .card::before {
    content:'';
    position:absolute; left:0; top:0; bottom:0; width:4px;
    border-radius:4px 0 0 4px;
  }
  .card.preco-barato::before  { background:var(--barato); }
  .card.preco-medio::before   { background:var(--medio); }
  .card.preco-pesado::before  { background:var(--pesado); }

  .card-img {
    width:76px; height:76px;
    object-fit:cover; flex-shrink:0;
    background:#eee;
    margin:auto 0 auto 10px;
    border-radius:12px;
  }

  .card-body {
    flex:1; padding:10px 10px 10px 12px;
    display:flex; flex-direction:column; justify-content:space-between;
    min-width:0;
  }

  .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:6px; }
  .card-nome { font-weight:800; font-size:.92rem; line-height:1.2; color:var(--text); }
  .card-tipo { font-size:.7rem; color:var(--sub); font-weight:600; margin-top:2px; }

  /* bolinha indicadora de preço */
  .preco-dot {
    width:11px; height:11px;
    border-radius:50%;
    flex-shrink:0; margin-top:3px;
  }
  .dot-barato { background:var(--barato); box-shadow:0 0 6px rgba(52,199,89,.5); }
  .dot-medio  { background:var(--medio);  box-shadow:0 0 6px rgba(255,159,10,.5); }
  .dot-pesado { background:var(--pesado); box-shadow:0 0 6px rgba(255,59,48,.5); }

  .card-bottom { display:flex; justify-content:space-between; align-items:center; font-size:.72rem; color:var(--sub); font-weight:700; margin-top:4px; }

  /* ──────── MODAL ──────── */
  .modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.55); z-index:50;
    align-items:flex-end; justify-content:center;
    backdrop-filter:blur(3px);
  }
  .modal-overlay.active { display:flex; }

  .modal-box {
    background:var(--white);
    border-radius:24px 24px 0 0;
    padding:0 0 32px;
    width:100%; max-width:500px;
    animation:slide-up .28s cubic-bezier(.34,1.4,.64,1);
    max-height:90vh; overflow-y:auto;
  }
  @keyframes slide-up { from { transform:translateY(100%); } to { transform:translateY(0); } }

  .modal-handle {
    width:40px; height:4px; border-radius:2px;
    background:#ddd; margin:12px auto 0;
  }

  .modal-header {
    padding:16px 20px 14px;
    border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:flex-start;
  }
  .modal-titulo { font-weight:900; font-size:1.2rem; line-height:1.2; }
  .modal-sub { font-size:.75rem; color:var(--sub); margin-top:3px; font-weight:600; }

  .modal-close {
    background:var(--bg); border:none; border-radius:50%;
    width:30px; height:30px; font-size:1.1rem;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    color:var(--sub); flex-shrink:0; margin-top:2px;
  }

  /* faixa de preço no modal */
  .modal-preco-bar {
    margin:14px 20px 0;
    border-radius:12px;
    padding:10px 14px;
    font-size:.8rem; font-weight:800;
    display:flex; align-items:center; gap:8px;
  }
  .bar-barato { background:#e8faf0; color:#1a8a3c; }
  .bar-medio  { background:#fff5e0; color:#b36b00; }
  .bar-pesado { background:#fff0ef; color:#c0241b; }

  /* botões dos apps */
  .modal-apps {
    padding:16px 20px 0;
    display:flex; gap:12px;
  }

  .app-btn {
    flex:1;
    height:54px;
    border-radius:14px;
    border:none;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:transform .15s, box-shadow .15s;
    text-decoration:none;
    overflow:hidden;
  }
  .app-btn:active { transform:scale(.94); }

  /* iFood: fundo BRANCO com borda vermelha sutil */
  .btn-ifood { background:#ffffff; box-shadow:0 3px 12px rgba(0,0,0,.12); border:1.5px solid #e8e8e8; }
  /* Keeta: fundo AMARELO marca */
  .btn-keeta { background:#ffe600; box-shadow:0 3px 12px rgba(255,230,0,.4); }
  /* 99Food: fundo AMARELO-LARANJA marca */
  .btn-99    { background:#ffcc00; box-shadow:0 3px 12px rgba(255,204,0,.4); }

  .modal-distancia {
    margin:14px 20px 0;
    background:var(--bg);
    border-radius:12px;
    padding:10px 14px;
    font-size:.78rem; color:#555; font-weight:700;
    display:flex; align-items:center; gap:6px;
  }

  /* ──────── LOADING ──────── */
  #msg-carregando { text-align:center; color:var(--sub); padding:40px 0; font-weight:700; font-size:.9rem; }

  /* ──────── LEGENDA ──────── */
  .legenda {
    display:flex; gap:14px; padding:10px 16px 2px;
    justify-content:center; max-width:500px; margin:0 auto;
  }
  .legenda-item { display:flex; align-items:center; gap:5px; font-size:.68rem; font-weight:700; color:var(--sub); }
  .legenda-dot { width:9px; height:9px; border-radius:50%; }
</style>
</head>
<body>

<header>
  <h1>🍕 Comida da Bunita</h1>
  <p id="status-gps">Carregando radar gastronômico...</p>
</header>

<div id="filtros">
  <button class="filtro-btn active" onclick="filtrar('todos',this)">Tudo</button>
  <button class="filtro-btn" onclick="filtrar('fast_food|pizza|burger|lanche',this)">🍔 Algo Gordo</button>
  <button class="filtro-btn" onclick="filtrar('restaurant|churrascaria',this)">🍛 Comida de Verdade</button>
  <button class="filtro-btn" onclick="filtrar('bakery|cafe',this)">☕ Café & Doce</button>
  <button class="filtro-btn" onclick="filtrar('pastel',this)">🥟 Pastelaria</button>
</div>

<div class="legenda">
  <div class="legenda-item"><div class="legenda-dot" style="background:#34c759"></div>Tranquilo ta Barato</div>
  <div class="legenda-item"><div class="legenda-dot" style="background:#ff9f0a"></div>Mei Caro</div>
  <div class="legenda-item"><div class="legenda-dot" style="background:#ff3b30"></div>Pesadinho</div>
</div>

<main id="lista">
  <p id="msg-carregando">🔍 Sintonizando com o bairro (Raio de 5km)...</p>
</main>

<div id="modal" class="modal-overlay" onclick="fecharModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div class="modal-titulo" id="m-titulo">—</div>
        <div class="modal-sub" id="m-subtipo">—</div>
      </div>
      <button class="modal-close" onclick="fecharModal()">✕</button>
    </div>

    <div id="m-preco-bar" class="modal-preco-bar bar-medio">💰 Médio / Mei Caro — até R$60</div>

    <div class="modal-apps">
      <a id="btn-ifood" href="#" target="_blank" class="app-btn btn-ifood" title="iFood">
        <svg viewBox="0 0 140 70" width="90" height="36">
          <text x="4" y="50" font-family="Arial Black,Impact,sans-serif" font-size="52" font-weight="900" fill="#ea1d2c" letter-spacing="-2">ifood</text>
          <path d="M22 58 Q68 76 108 56" stroke="#ea1d2c" stroke-width="4.5" fill="none" stroke-linecap="round"/>
          <path d="M102 52 L112 58 L100 62 Z" fill="#ea1d2c"/>
        </svg>
      </a>

      <a id="btn-keeta" href="#" target="_blank" class="app-btn btn-keeta" title="Keeta">
        <svg viewBox="0 0 130 68" width="84" height="34">
          <text x="4" y="46" font-family="Arial Rounded MT Bold,Arial Black,Verdana,sans-serif" font-size="44" font-weight="900" fill="#111" letter-spacing="-1">keeta</text>
          <path d="M12 54 Q55 72 108 52" stroke="#111" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-dasharray="5 4"/>
          <circle cx="112" cy="51" r="3.5" fill="#111"/>
          <circle cx="120" cy="54" r="3.5" fill="#111"/>
        </svg>
      </a>

      <a id="btn-99" href="#" target="_blank" class="app-btn btn-99" title="99Food">
        <svg viewBox="0 0 80 68" width="52" height="44">
          <text x="2" y="46" font-family="Arial Black,Impact,sans-serif" font-size="50" font-weight="900" fill="#111" letter-spacing="-4">99</text>
          <text x="10" y="62" font-family="Arial Black,sans-serif" font-size="16" font-weight="900" fill="#111" letter-spacing="1.5">Food</text>
        </svg>
      </a>
    </div>

    <div style="padding:10px 20px 0;">
      <a id="btn-google" href="#" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;height:48px;border-radius:14px;background:#fff;border:1.5px solid #e0e0e0;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:all .15s;" title="Ver no Google">
        <svg width="22" height="22" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        <span style="font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:800;color:#333;">Ver Cardápio &amp; Fotos no Google</span>
      </a>
    </div>

    <div class="modal-distancia" id="m-distancia">📍 — · 🕒 —</div>
  </div>
</div>

<script>
const LOCAL_BASE = "Vila Augusta, Guarulhos";
let listaLocais = [], minhaLat = 0, minhaLng = 0;

// ── Fotos por tipo/nome ──────────────────────────────────────────────────────
const FOTOS = {
  pizza:       'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=300&q=80',
  burger:      'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300&q=80',
  hamburguer:  'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300&q=80',
  bobs:        'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300&q=80',
  mcdonald:    'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300&q=80',
  sushi:       'https://images.unsplash.com/photo-1553621042-f6e147245754?w=300&q=80',
  churrasco:   'https://images.unsplash.com/photo-1544025162-d76694265947?w=300&q=80',
  churrascaria:'https://images.unsplash.com/photo-1544025162-d76694265947?w=300&q=80',
  pastel:      'https://images.unsplash.com/photo-1626132647523-66f5bf380027?w=300&q=80',
  pastelaria:  'https://images.unsplash.com/photo-1626132647523-66f5bf380027?w=300&q=80',
  dog:         'https://images.unsplash.com/photo-1619740455993-9e612b1af08a?w=300&q=80',
  cachorro:    'https://images.unsplash.com/photo-1619740455993-9e612b1af08a?w=300&q=80',
  hotdog:      'https://images.unsplash.com/photo-1619740455993-9e612b1af08a?w=300&q=80',
  subway:      'https://images.unsplash.com/photo-1509722747041-616f39b57569?w=300&q=80',
  habib:       'https://images.unsplash.com/photo-1565557623262-b51c2513a641?w=300&q=80',
  bakery:      'https://images.unsplash.com/photo-1509440159596-0249088772ff?w=300&q=80',
  cafe:        'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=300&q=80',
  default:     'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300&q=80',
};

function getFoto(nome, amenity) {
  const n = nome.toLowerCase();
  for (const [k, v] of Object.entries(FOTOS)) {
    if (n.includes(k)) return v;
  }
  return FOTOS[amenity] || FOTOS.default;
}

// ── Preço por tipo/nome ──────────────────────────────────────────────────────
function getPreco(nome, amenity) {
  const n = nome.toLowerCase();
  if (/churrascaria|steak|assador|rodizio|rodízio|bistrô|bistro|japonês|japones|sushi|temakeria|seafood|frutos/.test(n))
    return { nivel:'pesado', txt:'🔴 Pesadinho — acima de R$60', barClass:'bar-pesado', label:'Pesadinho' };
  if (/pastel|pastelaria|doceria|doce|cafe|café|bakery|padaria|lanche|cachorro|tapioca|coxinha|esfiha|habibs|habib|subway|bob|mcdonald|burger king|kfc|dog/.test(n) || amenity === 'bakery' || amenity === 'cafe')
    return { nivel:'barato', txt:'🟢 Tranquilo ta Barato — até R$35', barClass:'bar-barato', label:'Barato' };
  return { nivel:'medio', txt:'🟡 Médio / Mei Caro — até R$60', barClass:'bar-medio', label:'Médio' };
}

// ── Haversine ────────────────────────────────────────────────────────────────
function dist(la1,lo1,la2,lo2) {
  const R=6371, dLa=(la2-la1)*Math.PI/180, dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── Boot ─────────────────────────────────────────────────────────────────────
window.onload = () => {
  if (navigator.geolocation) {
    document.getElementById('status-gps').innerText = '📍 Buscando sua localização real...';
    navigator.geolocation.getCurrentPosition(
      pos => {
        minhaLat = pos.coords.latitude;
        minhaLng = pos.coords.longitude;
        varrer(minhaLat, minhaLng);
      },
      () => usarBairroBase(),
      { timeout: 4000, maximumAge: 60000 }
    );
  } else {
    usarBairroBase();
  }
};

function usarBairroBase() {
  document.getElementById('status-gps').innerText = `📍 Usando ponto fixo: ${LOCAL_BASE}`;
  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(LOCAL_BASE)}&limit=1`)
    .then(r => r.json())
    .then(d => {
      if (d && d.length > 0) {
        minhaLat = parseFloat(d[0].lat);
        minhaLng = parseFloat(d[0].lon);
        varrer(minhaLat, minhaLng);
      } else {
        document.getElementById('msg-carregando').innerText = 'Erro ao centralizar mapa no bairro.';
      }
    })
    .catch(() => {
      document.getElementById('msg-carregando').innerText = 'Sem sinal de rede.';
    });
}

function varrer(lat, lng) {
  document.getElementById('status-gps').innerText = '⚡ Fazendo varredura ultra-rápida (5km)...';

  // Varredura limpa e otimizada em 5km reais (5000 metros)
  const query = `[out:json][timeout:15];
(
  node["amenity"~"restaurant|fast_food|cafe|bakery|bar|food_court"](around:5000,${lat},${lng});
  way["amenity"~"restaurant|fast_food|cafe|bakery|bar|food_court"](around:5000,${lat},${lng});
);
out center body;`;

  fetch('https://overpass-api.de/api/interpreter', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'data=' + encodeURIComponent(query)
  })
  .then(r => r.json())
  .then(d => {
    if (d.elements && d.elements.length) {
      const vistos = new Set();
      listaLocais = d.elements
        .filter(l => {
          const lt = l.lat || (l.center && l.center.lat);
          const ln = l.lon || (l.center && l.center.lon);
          if (!lt || !ln || !l.tags || !l.tags.name) return false;
          
          const key = l.tags.name.toLowerCase() + '|' + parseFloat(lt).toFixed(3) + ',' + parseFloat(ln).toFixed(3);
          if (vistos.has(key)) return false;
          vistos.add(key);
          
          l._lat = parseFloat(lt);
          l._lon = parseFloat(ln);
          l._dist = dist(lat, lng, l._lat, l._lon);
          return l._dist <= 5.0; // Filtro de 5km ativo
        })
        .sort((a, b) => a._dist - b._dist);

      renderizarImediato(listaLocais);
    } else {
      document.getElementById('msg-carregando').innerText = 'Nenhum restaurante em até 5km.';
    }
  })
  .catch(() => {
    document.getElementById('msg-carregando').innerText = 'Servidor carregado. Atualize a página.';
  });
}

function renderizarImediato(locais) {
  const el = document.getElementById('lista');
  el.innerHTML='';

  locais.forEach(l => {
    const nome = l.tags.name;
    const amenity = l.tags.amenity || 'restaurant';
    const d = l._dist;
    const t = Math.max(2, Math.round(d * 4)); // Média de tempo com trânsito de bairro

    // Pega bairro ou rua direto da base do mapa sem fazer requisições lentas extras
    const bairroMapa = l.tags['addr:suburb'] || l.tags['addr:neighbourhood'] || '';
    const ruaMapa = l.tags['addr:street'] || '';
    
    let localizacao = '';
    if(bairroMapa) localizacao = `📌 ${bairroMapa}`;
    else if(ruaMapa) localizacao = `🛣️ ${ruaMapa}`;
    else {
      localizacao = ({restaurant:'🍛 Restaurante', fast_food:'🍔 Fast Food', cafe:'☕ Café', bakery:'🥐 Padaria'})[amenity] || '🍽️ Comida';
    }

    const foto = getFoto(nome, amenity);
    const preco = getPreco(nome, amenity);

    const div = document.createElement('div');
    div.className = `card preco-${preco.nivel}`;
    div.setAttribute('data-tipo', amenity);
    div.setAttribute('data-nome', nome.toLowerCase());

    div.innerHTML = `
      <img class="card-img" src="${foto}" alt="${nome}" loading="lazy" onerror="this.src='${FOTOS.default}'">
      <div class="card-body">
        <div class="card-top">
          <div>
            <div class="card-nome">${nome}</div>
            <div class="card-tipo">${localizacao}</div>
          </div>
          <div class="preco-dot dot-${preco.nivel}"></div>
        </div>
        <div class="card-bottom">
          <span>📍 ${d.toFixed(1)} km</span>
          <span>🕒 ~${t} min</span>
        </div>
      </div>`;

    div.onclick = () => abrirModal(nome, amenity, preco, d, t);
    el.appendChild(div);
  });

  document.getElementById('status-gps').innerText = `🍿 ${locais.length} locais encontrados em até 5km!`;
}

function filtrar(cat, btn) {
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.querySelectorAll('.card').forEach(c => {
    if(cat === 'todos') { c.style.display = 'flex'; return; }
    const regex = new RegExp(cat);
    c.style.display = (regex.test(c.dataset.tipo) || regex.test(c.dataset.nome)) ? 'flex' : 'none';
  });
}

function abrirModal(nome, amenity, preco, d, t) {
  const tipoLabel = ({restaurant:'🍛 Restaurante', fast_food:'🍔 Lanche / Fast Food', cafe:'☕ Café / Sobremesa', bakery:'🥐 Padaria / Doceria'})[amenity] || '🍽 Alimentação';

  document.getElementById('m-titulo').innerText = nome;
  document.getElementById('m-subtipo').innerText = tipoLabel;

  const bar = document.getElementById('m-preco-bar');
  bar.className = `modal-preco-bar ${preco.barClass}`;
  bar.innerText = preco.txt;

  document.getElementById('m-distancia').innerHTML = `📍 ${d.toFixed(1)} km de distância &nbsp;·&nbsp; 🕒 ~${t} min de percurso`;

  const q = encodeURIComponent(nome);
  const qLocal = encodeURIComponent(nome + ' Guarulhos');
  document.getElementById('btn-ifood').href  = `https://www.ifood.com.br/busca?q=${q}`;
  document.getElementById('btn-keeta').href  = `https://keeta.com.br/busca?q=${q}`;
  document.getElementById('btn-99').href     = `https://www.99app.com/food?q=${q}`;
  document.getElementById('btn-google').href = `https://www.google.com/search?q=${qLocal}+cardapio+fotos`;

  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function fecharModal() {
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow = '';
}
</script>
</body>
</html>
